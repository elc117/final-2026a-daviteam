<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyCard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111827;
      --surface:  #1F2937;
      --surface2: #263042;
      --border:   rgba(255,255,255,0.09);
      --text:     #F0EDE6;
      --muted:    #9CA3AF;
      --sage:     #7EB8A4;
      --sage-dim: #2a4f46;
      --amber:    #F59E0B;
      --amber-dim:#4B3209;
      --rose:     #E07685;
      --rose-dim: #4a1c25;
      --sky:      #60A5FA;
      --sky-dim:  #1e3a5f;
      --card-h:   320px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(17,24,39,0.88);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--sage);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .nav-button {
      border: 1px solid rgba(126,184,164,0.3);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      background: var(--sage-dim);
      color: var(--sage);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s, background 0.12s;
    }
    .nav-button.secondary {
      background: rgba(255,255,255,0.02);
      color: var(--text);
      border-color: var(--border);
    }
    .nav-button:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .nav-back {
      display: none;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-back:hover { color: var(--text); background: var(--surface); }
    .nav-back svg { width: 16px; height: 16px; }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── HOME ── */
    .home-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }
    .home-title {
      margin-bottom: 1.25rem;
    }
    .home-title h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 0.35rem;
    }
    .home-title p {
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state {
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
    }
    .decks-grid {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .deck-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .deck-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--sage);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .deck-card:hover { border-color: rgba(126,184,164,0.4); transform: translateY(-2px); }
    .deck-card:hover::before { opacity: 1; }

    .deck-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .deck-stats {
      display: flex;
      gap: 12px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat-pill.due   { background: var(--amber-dim); color: var(--amber); }
    .stat-pill.total { background: rgba(255,255,255,0.06); color: var(--muted); }
    .stat-pill svg   { width: 12px; height: 12px; }

    .deck-review-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 8px;
      background: var(--sage-dim);
      color: var(--sage);
      border: 1px solid rgba(126,184,164,0.25);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .deck-review-btn:hover { background: rgba(126,184,164,0.25); border-color: var(--sage); }
    .deck-review-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── DECK OVERVIEW ── */
    .deck-overview {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }
    .deck-overview h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .deck-overview .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 2rem;
    }
    .cards-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    .cards-table thead th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--border);
    }
    .cards-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .cards-table tbody tr:hover { background: var(--surface2); }
    .cards-table tbody td {
      padding: 12px 12px;
      color: var(--text);
    }
    .cards-table .col-front { font-weight: 500; }
    .cards-table .col-back  { color: var(--muted); }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .badge-new     { background: var(--sky-dim); color: var(--sky); }
    .badge-review  { background: var(--sage-dim); color: var(--sage); }
    .badge-suspend { background: rgba(255,255,255,0.06); color: var(--muted); }
    .badge-recog   { background: rgba(255,255,255,0.06); color: var(--muted); }
    .badge-revtype { background: var(--sage-dim); color: var(--sage); }

    .start-session-bar {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
    }
    .start-session-bar p { font-size: 14px; color: var(--muted); }
    .start-session-bar strong { color: var(--text); }
    .btn-primary {
      background: var(--sage);
      color: #0a1f1a;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.02);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,10,20,0.72);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 200;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      width: min(100%, 560px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 1.25rem;
    }
    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .modal-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1;
    }
    .modal-close {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .tab-button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-button.active {
      background: var(--sage-dim);
      color: var(--sage);
      border-color: rgba(126,184,164,0.3);
    }
    .modal-form {
      display: grid;
      gap: 12px;
    }
    .modal-form.hidden { display: none; }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 12px;
      padding: 0.85rem 0.95rem;
      font: inherit;
      outline: none;
    }
    .field textarea {
      min-height: 110px;
      resize: vertical;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(126,184,164,0.5);
    }
    .form-grid {
      display: grid;
      gap: 12px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .modal-error {
      color: var(--rose);
      font-size: 13px;
      min-height: 1.2em;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 0.25rem;
      flex-wrap: wrap;
    }
    .helper-text {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── REVIEW ── */
    .review-view {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }
    .review-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .review-deck-name {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }
    .review-counter {
      font-size: 13px;
      color: var(--muted);
    }
    .review-counter span { color: var(--text); font-weight: 600; }

    .progress-bar-wrap {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--sage);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* FLIP CARD — the signature element */
    .flip-scene {
      perspective: 1200px;
      height: var(--card-h);
      margin-bottom: 1.5rem;
      cursor: pointer;
    }
    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .flip-card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      text-align: center;
    }
    .card-face-back { transform: rotateY(180deg); background: var(--surface2); }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .card-content {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .card-hint {
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--muted);
    }
    .card-type-badge {
      position: absolute;
      top: 1rem; right: 1rem;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    /* ANSWER BUTTONS */
    .review-actions-prompt {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 0.75rem;
    }
    .review-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .review-buttons.hidden { visibility: hidden; pointer-events: none; }

    .rating-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: filter 0.15s, transform 0.1s;
    }
    .rating-btn:hover  { filter: brightness(1.12); transform: translateY(-2px); }
    .rating-btn:active { transform: translateY(0); }
    .rating-btn .key-hint {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.65;
    }
    .btn-miss { background: var(--rose-dim); color: var(--rose); border: 1px solid rgba(224,118,133,0.3); }
    .btn-hard { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .btn-easy { background: var(--sky-dim);  color: var(--sky);  border: 1px solid rgba(96,165,250,0.3); }

    /* DONE SCREEN */
    .done-screen {
      text-align: center;
      padding: 4rem 2rem;
    }
    .done-screen .checkmark {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--sage-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .done-screen .checkmark svg { color: var(--sage); width: 32px; height: 32px; }
    .done-screen h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .done-screen p { color: var(--muted); font-size: 14px; margin-bottom: 2rem; }
    .done-stats { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 2.5rem; }
    .done-stat { text-align: center; }
    .done-stat .val { font-size: 1.8rem; font-weight: 600; }
    .done-stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .val-miss { color: var(--rose); }
    .val-hard { color: var(--amber); }
    .val-easy { color: var(--sage); }

    /* EMPTY / LOADING */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
    }
    .empty-state svg { width: 40px; height: 40px; margin-bottom: 1rem; opacity: 0.35; }
    .empty-state p { font-size: 14px; }

    .loading { color: var(--muted); font-size: 14px; padding: 2rem; text-align: center; }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      nav { padding: 0.8rem 1rem; }
      .nav-actions { width: 100%; justify-content: flex-end; }
      .home-shell { padding: 1.5rem 1rem 3rem; }
      .home-title h1 { font-size: 1.9rem; }
      .decks-grid { padding: 0 1rem 3rem; }
      .deck-overview { padding: 1.5rem 1rem 3rem; }
      .review-view { padding: 1.5rem 1rem 3rem; }
      .card-content { font-size: 1.35rem; }
      .review-buttons { gap: 8px; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* DELETE BUTTONS */
    .deck-actions {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }
    .deck-actions .deck-review-btn {
      margin-top: 0;
      flex: 1;
    }
    .btn-delete {
      background: rgba(220, 53, 69, 0.1);
      color: #ff6b6b;
      border: 1px solid rgba(220, 53, 69, 0.3);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-delete:hover {
      background: rgba(220, 53, 69, 0.25);
      border-color: #ff6b6b;
    }
    .btn-table-delete {
      background: rgba(220, 53, 69, 0.08);
      color: #ff6b6b;
      border: 1px solid rgba(220, 53, 69, 0.2);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-table-delete:hover {
      background: rgba(220, 53, 69, 0.2);
      border-color: #ff6b6b;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" onclick="navigate('home'); return false;">StudyCard</a>
  <div class="nav-actions">
    <button class="nav-button secondary" type="button" onclick="openModal('deck')">New deck</button>
    <button class="nav-button" type="button" onclick="openModal('card')">New card</button>
  </div>
  <button class="nav-back" id="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
    </svg>
    Back
  </button>
</nav>

<!-- HOME VIEW -->
<div class="view active" id="view-home">
  <div class="home-shell">
    <div class="home-title">
      <h1>Decks</h1>
      <p id="home-subtitle">Loading…</p>
    </div>
    <div class="decks-grid" id="decks-grid">
      <div class="loading">Loading decks…</div>
    </div>
  </div>
</div>

<!-- DECK OVERVIEW VIEW -->
<div class="view" id="view-deck">
  <div class="deck-overview">
    <h2 id="deck-title">Deck</h2>
    <p class="subtitle" id="deck-subtitle"></p>
    <table class="cards-table">
      <thead>
        <tr>
          <th>Front</th>
          <th>Back</th>
          <th>Type</th>
          <th>Status</th>
          <th>Next review</th>
          <th style="width: 80px; text-align: center;">Actions</th>
        </tr>
      </thead>
      <tbody id="cards-tbody"></tbody>
    </table>
    <div class="start-session-bar" id="start-session-bar">
      <p><strong id="due-count">0</strong> cards due for review</p>
      <button class="btn-primary" id="start-review-btn">Start review →</button>
    </div>
  </div>
</div>

<!-- REVIEW VIEW -->
<div class="view" id="view-review">
  <div class="review-view">
    <div class="review-topbar" id="review-topbar">
      <span class="review-deck-name" id="review-deck-name"></span>
      <span class="review-counter"><span id="cards-remaining">0</span> remaining</span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- Flip card -->
    <div class="flip-scene" id="flip-scene" onclick="flipCard()">
      <div class="flip-card" id="flip-card">
        <div class="card-face card-face-front">
          <span class="card-type-badge" id="card-type-label">Review</span>
          <div class="card-label">Front</div>
          <div class="card-content" id="card-front-text"></div>
          <div class="card-hint">Click to reveal answer</div>
        </div>
        <div class="card-face card-face-back">
          <div class="card-label">Answer</div>
          <div class="card-content" id="card-back-text"></div>
        </div>
      </div>
    </div>

    <p class="review-actions-prompt" id="flip-prompt">Click the card to reveal</p>

    <div class="review-buttons hidden" id="review-buttons">
      <button class="rating-btn btn-miss" onclick="rate('MISS')">
        Miss
        <span class="key-hint">key: 1</span>
      </button>
      <button class="rating-btn btn-hard" onclick="rate('HARD')">
        Hard
        <span class="key-hint">key: 2</span>
      </button>
      <button class="rating-btn btn-easy" onclick="rate('EASY')">
        Easy
        <span class="key-hint">key: 3</span>
      </button>
    </div>

    <!-- Done screen (initially hidden inside review view) -->
    <div class="done-screen" id="done-screen" style="display:none;">
      <div class="checkmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2>Session complete</h2>
      <p id="done-subtitle">Great work!</p>
      <div class="done-stats">
        <div class="done-stat">
          <div class="val val-miss" id="done-miss">0</div>
          <div class="lbl">Missed</div>
        </div>
        <div class="done-stat">
          <div class="val val-hard" id="done-hard">0</div>
          <div class="lbl">Hard</div>
        </div>
        <div class="done-stat">
          <div class="val val-easy" id="done-easy">0</div>
          <div class="lbl">Easy</div>
        </div>
      </div>
      <button class="btn-primary" onclick="navigate('home')">Back to decks</button>
    </div>
  </div>
</div>


<!-- FORM MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">New deck</h2>
        <p class="helper-text" id="modal-subtitle">Create a new deck or a new card.</p>
      </div>
      <button class="modal-close" type="button" onclick="closeModal()">×</button>
    </div>

    <div class="modal-tabs">
      <button class="tab-button active" type="button" id="deck-tab" onclick="switchModal('deck')">Deck</button>
      <button class="tab-button" type="button" id="card-tab" onclick="switchModal('card')">Card</button>
    </div>

    <p class="modal-error" id="modal-error"></p>

    <form class="modal-form" id="deck-form">
      <div class="field">
        <label for="deck-name">Deck name</label>
        <input id="deck-name" name="name" type="text" required maxlength="60" placeholder="e.g. Programming Paradigms" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" type="submit">Create deck</button>
      </div>
    </form>

    <form class="modal-form hidden" id="card-form">
      <div class="field">
        <label for="card-deck-id">Deck</label>
        <select id="card-deck-id" name="deckId" required></select>
      </div>
      <div class="field">
        <label for="card-type">Type</label>
        <select id="card-type" name="type" required>
          <option value="RECALL">Recall</option>
          <option value="RECOGNITION">Recognition</option>
        </select>
      </div>
      <div class="field">
        <label for="card-front">Front</label>
        <textarea id="card-front" name="front" required placeholder="Question or prompt"></textarea>
      </div>
      <div class="field">
        <label for="card-back">Back</label>
        <textarea id="card-back" name="back" required placeholder="Answer or explanation"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" type="submit">Create card</button>
      </div>
    </form>
  </div>
</div>

<script>
  /* =====================================================
     STATE
     ===================================================== */
  let currentDeckId = null;
  let reviewQueue   = [];
  let currentIndex  = 0;
  let totalCards    = 0;
  let flipped       = false;
  let sessionStats  = { miss: 0, hard: 0, easy: 0 };
  let history       = ['home'];
  let cachedDecks   = [];
  let modalMode     = 'deck';

  /* =====================================================
     ROUTING
     ===================================================== */
  function navigate(view, deckId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');

    const backBtn = document.getElementById('nav-back');
    backBtn.style.display = view === 'home' ? 'none' : 'flex';

    if (view === 'home')   loadHome();
    if (view === 'deck')  { currentDeckId = deckId; loadDeck(deckId); }
    if (view === 'review'){ startReview(deckId); }

    history.push(view);
    window.scrollTo(0, 0);
  }

  function goBack() {
    history.pop();
    const prev = history[history.length - 1] || 'home';
    if (prev === 'home')  navigate('home');
    else if (prev === 'deck') navigate('deck', currentDeckId);
  }

  function openModal(mode) {
    if ((mode || 'deck') === 'card' && (!cachedDecks || cachedDecks.length === 0)) {
      mode = 'deck';
    }
    switchModal(mode || 'deck');
    populateDeckSelect();
    document.getElementById('modal-error').textContent =
      (mode === 'card' && (!cachedDecks || cachedDecks.length === 0))
        ? 'Create a deck first.'
        : '';
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById(modalMode === 'deck' ? 'deck-name' : 'card-front').focus();
  }

  function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function switchModal(mode) {
    modalMode = mode === 'card' ? 'card' : 'deck';
    document.getElementById('modal-title').textContent = modalMode === 'card' ? 'New card' : 'New deck';
    document.getElementById('modal-subtitle').textContent =
      modalMode === 'card'
        ? 'Add a new flashcard to a deck.'
        : 'Create a new deck for your flashcards.';
    document.getElementById('deck-form').classList.toggle('hidden', modalMode !== 'deck');
    document.getElementById('card-form').classList.toggle('hidden', modalMode !== 'card');
    document.getElementById('deck-tab').classList.toggle('active', modalMode === 'deck');
    document.getElementById('card-tab').classList.toggle('active', modalMode === 'card');
  }

  function populateDeckSelect() {
    const select = document.getElementById('card-deck-id');
    const decks = cachedDecks || [];
    const fallback = currentDeckId || (decks[0] && decks[0].id) || '';

    select.innerHTML = decks.length === 0
      ? '<option value="">No decks available</option>'
      : decks.map(deck => `<option value="${deck.id}">${escHtml(deck.name || 'Deck ' + deck.id)}</option>`).join('');

    select.disabled = decks.length === 0;
    if (fallback) select.value = String(fallback);
  }

  async function postForm(path, data) {
    const res = await fetch(API_BASE + '/api' + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
      body: new URLSearchParams(data).toString()
    });
    if (!res.ok) throw new Error('API error ' + res.status);
    return res.json();
  }

  /* =====================================================
     API HELPERS
     ===================================================== */
  async function apiFetch(path, options = {}) {
    const res = await fetch(API_BASE + '/api' + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    if (!res.ok) throw new Error('API error ' + res.status);
    return res.json();
  }

  /* =====================================================
     HOME — load decks
     ===================================================== */
  async function loadHome() {
    const grid = document.getElementById('decks-grid');
    grid.innerHTML = '<div class="loading">Loading…</div>';

    try {
      const decks = await apiFetch('/decks');
      cachedDecks = decks;
      populateDeckSelect();

      const totalDue = decks.reduce((sum, d) => sum + (d.dueCount || 0), 0);
      document.getElementById('home-subtitle').textContent =
        totalDue > 0
          ? `${totalDue} card${totalDue !== 1 ? 's' : ''} waiting for review`
          : 'All caught up — nothing to review right now.';

      if (decks.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <p>No decks yet. Create one to get started.</p>
          </div>`;
        return;
      }

      grid.innerHTML = decks.map(deck => {
        const cards = deck.cards || deck.allCards || [];
        const due   = deck.dueCount   || cards.filter(isDue).length;
        const total = cards.length || deck.cardCount || 0;
        return `
          <div class="deck-card" onclick="navigate('deck', ${deck.id})">
            <div class="deck-name">${escHtml(deck.name || 'Deck ' + deck.id)}</div>
            <div class="deck-stats">
              <span class="stat-pill due">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                ${due} due
              </span>
              <span class="stat-pill total">${total} total</span>
            </div>
            <div class="deck-actions">
              <button class="deck-review-btn" ${due === 0 ? 'disabled' : ''}
                onclick="event.stopPropagation(); navigate('review', ${deck.id})">
                ${due > 0 ? 'Review now →' : 'Nothing due'}
              </button>
              <button class="btn-delete" onclick="event.stopPropagation(); deleteDeck(${deck.id})">
                Delete
              </button>
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      grid.innerHTML = renderError('Could not load decks. Is the server running?');
    }
  }

  document.getElementById('deck-form').addEventListener('submit', async e => {
    e.preventDefault();
    const error = document.getElementById('modal-error');
    error.textContent = '';
    try {
      await postForm('/decks', {
        name: document.getElementById('deck-name').value.trim()
      });
      e.target.reset();
      closeModal();
      await loadHome();
    } catch (err) {
      error.textContent = 'Could not create deck.';
    }
  });

  document.getElementById('card-form').addEventListener('submit', async e => {
    e.preventDefault();
    const error = document.getElementById('modal-error');
    error.textContent = '';
    try {
      const deckId = document.getElementById('card-deck-id').value;
      await postForm('/cards', {
        deckId: deckId,
        front: document.getElementById('card-front').value.trim(),
        back: document.getElementById('card-back').value.trim(),
        type: document.getElementById('card-type').value
      });
      e.target.reset();
      closeModal();
      await loadHome();
      if (currentDeckId && String(currentDeckId) === String(deckId)) {
        await loadDeck(currentDeckId);
      }
    } catch (err) {
      error.textContent = 'Could not create card.';
    }
  });

  /* =====================================================
     DECK OVERVIEW
     ===================================================== */
  async function loadDeck(deckId) {
    document.getElementById('deck-title').textContent = 'Loading…';
    document.getElementById('cards-tbody').innerHTML = '<tr><td colspan="6" class="loading">Loading…</td></tr>';

    try {
      const deck = await apiFetch('/decks/' + deckId);
      const cards = deck.cards || deck.allCards || [];;

      document.getElementById('deck-title').textContent = deck.name || 'Deck ' + deckId;
      document.getElementById('deck-subtitle').textContent =
        `${cards.length} card${cards.length !== 1 ? 's' : ''} · daily limit: ${deck.dailyReviewLimit}`;

      const dueCards = cards.filter(c => isDue(c));
      document.getElementById('due-count').textContent = dueCards.length;

      const startBtn = document.getElementById('start-review-btn');
      startBtn.disabled = dueCards.length === 0;
      startBtn.textContent = dueCards.length > 0 ? 'Start review →' : 'Nothing due';
      startBtn.onclick = () => navigate('review', deckId);

      document.getElementById('cards-tbody').innerHTML = cards.length === 0
        ? '<tr><td colspan="6" class="empty-state" style="padding:2rem;color:var(--muted);text-align:center;">No cards in this deck.</td></tr>'
        : cards.map(card => `
          <tr>
            <td class="col-front">${escHtml(card.front)}</td>
            <td class="col-back">${escHtml(card.back)}</td>
            <td>${typeBadge(card.type)}</td>
            <td>${statusBadge(card.status)}</td>
            <td style="color:var(--muted);font-size:12px;">${formatDate(card.nextReview)}</td>
            <td style="text-align: center;">
              <button class="btn-table-delete" onclick="deleteCard(${card.id}, event)">Delete</button>
            </td>
          </tr>`).join('');
    } catch (e) {
      document.getElementById('deck-title').textContent = 'Error';
      document.getElementById('cards-tbody').innerHTML =
        `<tr><td colspan="6">${renderError('Could not load deck.')}</td></tr>`;
    }
  }

  /* =====================================================
     REVIEW SESSION
     ===================================================== */
  async function startReview(deckId) {
    currentDeckId = deckId;
    sessionStats  = { miss: 0, hard: 0, easy: 0 };

    document.getElementById('done-screen').style.display   = 'none';
    document.getElementById('flip-scene').style.display    = '';
    document.getElementById('review-buttons').style.display = '';
    document.getElementById('flip-prompt').style.display   = '';
    document.getElementById('review-topbar').style.display  = '';
    document.getElementById('progress-fill').parentElement.style.display = '';

    try {
      const deck = await apiFetch('/decks/' + deckId + '/review');
      reviewQueue  = deck.cards || deck;
      totalCards   = reviewQueue.length;
      currentIndex = 0;

      document.getElementById('review-deck-name').textContent = deck.name || 'Review';

      if (totalCards === 0) {
        showDoneScreen();
        return;
      }
      showCurrentCard();
    } catch (e) {
      document.getElementById('review-deck-name').textContent = 'Error loading session';
    }
  }

  function showCurrentCard() {
    if (currentIndex >= reviewQueue.length) {
      showDoneScreen();
      return;
    }

    const card = reviewQueue[currentIndex];
    flipped    = false;

    document.getElementById('flip-card').classList.remove('flipped');
    document.getElementById('card-front-text').textContent = card.front;
    document.getElementById('card-back-text').textContent  = card.back;
    document.getElementById('card-type-label').textContent =
      card.type === 'RECOGNITION' ? 'Recognition' : 'Review';	

    const remaining = reviewQueue.length - currentIndex;
    document.getElementById('cards-remaining').textContent = remaining;

    const progress = Math.round((currentIndex / totalCards) * 100);
    document.getElementById('progress-fill').style.width = progress + '%';

    document.getElementById('review-buttons').classList.add('hidden');
    document.getElementById('flip-prompt').textContent = 'Click the card to reveal answer';
  }

  function flipCard() {
    if (flipped) return;
    flipped = true;
    document.getElementById('flip-card').classList.add('flipped');
    document.getElementById('review-buttons').classList.remove('hidden');
    document.getElementById('flip-prompt').textContent = 'How did it go?';
  }

  async function rate(rating) {
    if (!flipped) return;
    const card = reviewQueue[currentIndex];
    sessionStats[rating.toLowerCase()]++;

    try {
      await apiFetch('/cards/' + card.id + '/review', {
        method: 'POST',
        body: JSON.stringify({ rating })
      });
    } catch (_) { /* proceed anyway */ }

    currentIndex++;
    showCurrentCard();
  }

  function showDoneScreen() {
    document.getElementById('flip-scene').style.display    = 'none';
    document.getElementById('review-buttons').style.display = 'none';
    document.getElementById('flip-prompt').style.display   = 'none';
    document.getElementById('review-topbar').style.display  = 'none';
    document.getElementById('progress-fill').parentElement.style.display = 'none';

    document.getElementById('done-miss').textContent = sessionStats.miss;
    document.getElementById('done-hard').textContent = sessionStats.hard;
    document.getElementById('done-easy').textContent = sessionStats.easy;
    document.getElementById('done-subtitle').textContent =
      totalCards === 0 ? 'Nothing due in this deck.' :
      `You reviewed ${totalCards} card${totalCards !== 1 ? 's' : ''}.`;

    document.getElementById('done-screen').style.display = '';
    document.getElementById('progress-fill').style.width = '100%';
  }

  /* =====================================================
     KEYBOARD SHORTCUTS
     ===================================================== */
  document.addEventListener('keydown', e => {
    if (!document.getElementById('view-review').classList.contains('active')) return;
    if (document.getElementById('modal-overlay').classList.contains('active')) return;
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    if (e.key === '1') rate('MISS');
    if (e.key === '2') rate('HARD');
    if (e.key === '3') rate('EASY');
  });

  /* =====================================================
     HELPERS
     ===================================================== */
  function isDue(card) {
    if (!card.nextReview) return card.status !== 'SUSPENDED';
    return new Date(card.nextReview) <= new Date();
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    const today = new Date();
    const diff  = Math.ceil((d - today) / 86400000);
    if (diff < 0)  return 'Overdue';
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function statusBadge(s) {
    const map = {
      NEW:       ['badge-new',     'New'],
      REVIEW:    ['badge-review',  'Review'],
      SUSPENDED: ['badge-suspend', 'Suspended'],
    };
    const [cls, label] = map[s] || map.NEW;
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function typeBadge(t) {
    return t === 'RECOGNITION'
      ? `<span class="badge badge-recog">Recognition</span>`
      : `<span class="badge badge-revtype">Review</span>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderError(msg) {
    return `<div style="color:var(--rose);font-size:13px;padding:1rem 0;">${escHtml(msg)}</div>`;
  }

  async function deleteDeck(deckId) {
    if (!confirm('Are you sure you want to delete this deck?')) return;
    try {
      const res = await fetch(API_BASE + '/api/decks/delete/' + deckId, { method: 'POST' });
      if (!res.ok) throw new Error();
      await loadHome();
    } catch (e) {
      alert('Failed to delete deck');
    }
  }

  async function deleteCard(cardId, event) {
    if (event) event.stopPropagation();
    if (!confirm('Are you sure you want to delete this card?')) return;
    try {
      const res = await fetch(API_BASE + '/api/cards/delete/' + cardId, { method: 'POST' });
      if (!res.ok) throw new Error();
      if (currentDeckId) {
        await loadDeck(currentDeckId);
      }
    } catch (e) {
      alert('Failed to delete card');
    }
  }

  /* =====================================================
     BOOT
     ===================================================== */
  const API_BASE = (window.API_BASE_URL || '').replace(/\/$/, '');
  document.getElementById('nav-back').style.display = 'none';
  loadHome();
</script>
</body>
</html>
